<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRM - Chiqim</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body data-page="chiqim">
  <main class="container">
    <header class="topbar card auth-required hidden">
      <div>
        <h1>Chiqim bo'limi</h1>
        <p class="hint">Xarajatlarni kiritish va boshqarish</p>
      </div>
      <div class="topbar-actions">
        <nav class="nav">
          <a href="/index" data-nav="index">
            <svg class="nav-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V5m6 14V9m6 10V13m6 6V7"/></svg>
            <span>Dashboard</span>
          </a>
          <a href="/sotuv" data-nav="sotuv">
            <svg class="nav-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 4h2l2.4 10.2a2 2 0 0 0 2 1.5h7.8a2 2 0 0 0 2-1.6L21 7H8"/><circle cx="10" cy="20" r="1.6"/><circle cx="18" cy="20" r="1.6"/></svg>
            <span>Sotuv</span>
          </a>
          <a href="/chiqim" data-nav="chiqim">
            <svg class="nav-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h18v10H3z"/><path d="M3 11h18"/><circle cx="8" cy="16" r="1.3"/></svg>
            <span>Chiqim</span>
          </a>
          <a href="/mahsulot" data-nav="mahsulot">
            <svg class="nav-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3 8 4-8 4-8-4 8-4z"/><path d="m4 7 8 4 8-4"/><path d="M4 7v10l8 4 8-4V7"/></svg>
            <span>Mahsulot</span>
          </a>
        </nav>
        <button id="themeToggle" class="icon-btn" type="button" aria-label="Tema almashtirish" title="Tema">
          <span id="themeIcon">&#9728;</span>
        </button>
        <button id="logoutBtn" class="btn logout-btn">
          <svg class="btn-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M14 3h5v18h-5"/></svg>
          <span>Chiqish</span>
        </button>
      </div>
    </header>

    <section id="loginSection" class="card login-section">
      <h2>Admin kirish</h2>
      <form id="loginForm" class="grid">
        <label>Login <input name="username" required value="admin"></label>
        <label>Parol <input name="password" type="password" required value="admin123"></label>
        <button type="submit" class="btn">Kirish</button>
      </form>
    </section>

    <section id="expenseSection" class="auth-required hidden">
      <article class="card">
        <h3>Chiqimlar jadvali</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nomi</th>
                <th>Summa</th>
                <th>Komment</th>
                <th>Sana</th>
                <th>Amal</th>
              </tr>
            </thead>
            <tbody id="expenseTable"></tbody>
          </table>
        </div>
      </article>

      <div class="center-action-wrap">
        <button id="expenseToggleBtn" class="btn" type="button">Chiqim qo'shish</button>
      </div>

      <article id="expenseFormCard" class="card narrow hidden">
        <h3 id="expenseFormTitle">Chiqim qo'shish</h3>
        <form id="expenseForm" class="grid">
          <input type="hidden" name="expense_id">
          <label>Nomi <input name="name" required></label>
          <label>Summa <input name="amount" type="number" min="0.01" step="0.01" required></label>
          <label>Komment <input name="comment"></label>
          <div class="form-actions">
            <button type="submit" class="btn">Saqlash</button>
            <button id="expenseCancelBtn" type="button" class="btn ghost">Bekor qilish</button>
          </div>
        </form>
      </article>
    </section>
  </main>
  <div id="toast" class="toast hidden"></div>
  <script src="/assets/app.js"></script>
</body>
</html>
